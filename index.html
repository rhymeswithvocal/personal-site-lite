<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charlie Trochlil</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #8CBCB9;
      color: #2d3748;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 2rem 1rem;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #8CBCB9;
      border: 2px solid #DDA448;
      margin-bottom: 1rem;
      object-fit: cover;
    }

    .name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #BB342F;
    }

    .bio {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: #2d3748;
      text-align: center;
      max-width: 280px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 400px;
    }

    @media (min-width: 640px) {
      .avatar {
        width: 160px;
        height: 160px;
        border-radius: 16px;
      }

      .links {
        display: grid;
        grid-template-columns: 1fr 1fr;
        max-width: 560px;
      }
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 0.875rem 1.25rem;
      background: #8D6A9F;
      color: #ffffff;
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid #7a5a8a;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .link-btn:hover {
      background: #DDA448;
      border-color: #BB342F;
      color: #ffffff;
      transform: translateY(-1px);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #C5CBD3;
    }
  </style>
</head>
<body>

  <div class="profile">
    <!-- Replace src with your photo, or remove the <img> entirely -->
    <img class="avatar" src="face.jpg" alt="Profile photo" onerror="this.style.display='none'" />
    <div class="name">Charlie Trochlil</div>
    <div class="bio">Hello! You might be here because you're a neighbor, a prospective employer, or a friend from online. I hope you can find what you're looking for!</div>
  </div>

  <div class="links">
    <!-- <a class="link-btn" href="partiful link" target="_blank" rel="noopener">Neighborhood Party</a> -->
    <a class="link-btn" href="https://www.linkedin.com/in/charlietrochlil/" target="_blank" rel="noopener">Linkedin</a>
    <!-- <a class="link-btn" href="https://twitter.com/yourhandle" target="_blank" rel="noopener">Resumé</a> -->
    <a class="link-btn" href="https://substack.com/@rhymeswithvocal" target="_blank" rel="noopener">Substack</a>
    <a class="link-btn" href="https://ghoulsandgunsmoke.com/" target="_blank" rel="noopener">Ghouls & Gunsmoke</a>
    <a class="link-btn" href="mailto:charlie.trochlil@gmail.com">Email Me</a>
    <!-- Add or remove buttons as needed -->
  </div>

  <footer>charlietrochlil.com</footer>

</body>
</html>
